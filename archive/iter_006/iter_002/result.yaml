experimenter_view: 'VICReg variance penalty (λ_var=25) is NOT working as intended.
  After 30 epochs,

  per-dimension standard deviations across all layers remain extremely low

  (~0.07–0.08), far below the VICReg target of ≥1.0. In fact, variance

  DECREASED during training (spatial_l0 went from 0.118 at init to 0.071 at epoch
  30),

  suggesting the JEPA prediction-loss gradient dominates and overwhelms the

  variance term. Pooled variance is pathologically low (~0.075), confirming that

  mean-pooling over all space-time positions collapses representation diversity.


  Pooling comparison reveals a clear hierarchy:

  1. spatial_pooled_then_flat (mean-pool spatial, keep temporal): 53.5% test acc

  2. temporal_pooled_then_flat (mean-pool temporal, keep spatial): 49.0% test acc

  3. standard pooled (mean over everything): 44.25% test acc

  4. temporal_flat + PCA100: 41.0% test acc


  The >9 percentage-point gap between the standard pooled method and

  spatial_pooled_then_flat proves that the readout strategy—not just the

  encoder—is the primary bottleneck. Task-relevant temporal structure is

  preserved when spatial positions are averaged per timestep, but it is erased

  when both dimensions are pooled simultaneously. The recommendation is to adopt

  spatial_pooled_then_flat (or a learned attention/aggregation head) as the

  downstream readout, and to independently debug why VICReg fails to maintain

  per-dim std ≥ 1.0 (possible causes: prediction-loss magnitude, tiny batch

  statistics, or gradient cancellation between variance and covariance terms).

  '
