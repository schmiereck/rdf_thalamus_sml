experimenter_view: 'The pooled VICReg fix report was generated from pooled_vicreg_results.csv

  (5,175 bytes, 40 rows across 5 seeds × 2 VICReg conditions × 2 readout types

  × 2 conditions P3-C/Untrained). Key findings: (1) The VICReg fix

  mechanistically works — pooled std increased 80% from 0.072 to 0.130

  (p<0.0001, d=-6.16), variance loss went from collapsed 0.0 to active 0.87.

  (2) Test accuracy significantly improved from 0.4400 to 0.4915 (+5.15pp,

  p=0.044, d=-1.75). (3) However, the pre-registered F1 criterion (gain vs

  untrained ≥ 8pp) still fails — gain is 7.75pp, just 0.25pp below threshold.

  (4) All other criteria (F2, F3, F4) pass. The universal parameter hypothesis

  remains falsified despite the VICReg fix improving representations. The fix

  alone is insufficient — training depth, epochs, or readout capacity may need

  enhancement.

  '
