task: "## Task: Fix Phase 3 — Add Pooled VICReg + Better Readout, Run 5-Seed Experiment\n\
  \n### CRITICAL CONTEXT from Diagnostic (iter 6.2)\n\nTwo root causes identified\
  \ for Phase 3 failure:\n\n**Problem 1: VICReg is INEFFECTIVE on intermediate codes**\n\
  - Per-dim std at all layers: ~0.07-0.08 (VICReg target: ≥1.0)\n- Variance DECREASED\
  \ during training (not increased)\n- Math: VICReg gradient per element = λ/(M·d·std).\
  \ For M=B·T·S=28672 (spatial layer 0), gradient ≈ 0.0008/elem. Prediction gradient\
  \ ≈ 0.016/elem. VICReg is overwhelmed ~20×.\n- FIX: Add a separate VICReg loss on\
  \ the POOLED representation (shape (B, d_out) = (64, 16)). Here M=B=64, so gradient\
  \ per element ≈ 25/(64·16·0.07) ≈ 0.33/elem — 400× stronger than per-layer VICReg.\n\
  \n**Problem 2: Mean-pooling destroys discriminative information**\n- Pooled (B,16):\
  \ 44.25% test acc\n- spatial_pooled_then_flat (B,416): 53.5% test acc  (+9.25pp)\n\
  - FIX: Use spatial_pooled_then_flat as the classification readout. This means: from\
  \ the final temporal output (B, 26, 10, 16), mean-pool over spatial (axis=2) → (B,\
  \ 26, 16), then flatten → (B, 416).\n\n### EXPERIMENT DESIGN (Pre-registered)\n\n\
  This is a 2×2 factorial with the existing baseline:\n\n| Condition | Pooled VICReg\
  \ | Readout | Expected role |\n|-----------|--------------|---------|---------------|\n\
  | A (baseline) | No | Pooled | Reuse iter_005 P3-C results |\n| B (readout-only)\
  \ | No | spatial_pooled_then_flat | Quantify readout improvement |\n| C (VICReg-only)\
  \ | Yes | Pooled | Quantify VICReg improvement |\n| D (both fixes) | Yes | spatial_pooled_then_flat\
  \ | PRIMARY: both fixes combined |\n\n**New runs needed:**\n- B: P3-C + current\
  \ training + spatial_pooled_then_flat readout → 5 seeds\n- C: P3-C + pooled VICReg\
  \ + pooled readout → 5 seeds\n- D: P3-C + pooled VICReg + spatial_pooled_then_flat\
  \ readout → 5 seeds\n- Untrained + spatial_pooled_then_flat readout → 5 seeds\n\n\
  **Falsification criteria (same as pre-registration):**\n- Condition D must achieve\
  \ ≥8pp gain over untrained (spatial_pooled readout baseline)\n- Gain must be statistically\
  \ significant (paired t-test p < 0.05, Cohen's d ≥ 0.8)\n\n### IMPLEMENTATION PLAN\n\
  \n**Step 1: Create src/run_phase3_vicreg_fix.py**\n\nBased on src/run_phase3_optimized.py,\
  \ with these modifications:\n\n1. **Add pooled VICReg function** (implement in the\
  \ new file):\n```python\ndef pooled_vicreg_loss(z_pooled, eps=1.0):\n    \"\"\"\n\
  \    Compute VICReg variance + covariance loss on pooled representation.\n    z_pooled:\
  \ (B, d) \n    Returns: var_loss, cov_loss (scalars)\n    \"\"\"\n    B, d = z_pooled.shape\n\
  \    # Variance: mean of max(0, 1 - std_j) over dimensions\n    std = np.sqrt(z_pooled.var(axis=0,\
  \ ddof=0) + 1e-12)\n    var_loss = float(np.mean(np.maximum(0.0, eps - std)))\n\
  \    \n    # Covariance: (1/d) * sum of off-diagonal C_{j,k}^2\n    zc = z_pooled\
  \ - z_pooled.mean(axis=0, keepdims=True)\n    cov = (zc.T @ zc) / B\n    mask =\
  \ 1.0 - np.eye(d)\n    cov_loss = float(np.sum(cov ** 2 * mask) / d)\n    \n   \
  \ return var_loss, cov_loss\n```\n\n2. **Add pooled VICReg gradient function**:\n\
  ```python\ndef pooled_vicreg_grad(z_pooled, lambda_var=25.0, lambda_cov=25.0, eps=1.0):\n\
  \    \"\"\"\n    Compute gradient of VICReg loss w.r.t. z_pooled.\n    z_pooled:\
  \ (B, d)\n    Returns: dL_dz_pooled: (B, d)\n    \"\"\"\n    B, d = z_pooled.shape\n\
  \    mu = z_pooled.mean(axis=0, keepdims=True)\n    std = np.sqrt(z_pooled.var(axis=0,\
  \ ddof=0) + 1e-12)\n    \n    # Variance gradient\n    mask = (std < eps).astype(float)\n\
  \    dz_var = -(lambda_var / d) * mask * (z_pooled - mu) / (B * std + 1e-12)\n \
  \   \n    # Covariance gradient\n    zc = z_pooled - mu\n    cov = (zc.T @ zc) /\
  \ B\n    C_off = cov * (1.0 - np.eye(d))\n    dz_cov = (lambda_cov * 4.0 / (B *\
  \ d)) * (zc @ C_off)\n    \n    return dz_var + dz_cov\n```\n\n3. **Modify train_jepa_epoch**\
  \ to optionally include pooled VICReg:\n   - After the forward pass, compute pooled\
  \ VICReg loss on `fwd[\"pooled\"]`\n   - Compute pooled VICReg gradient\n   - The\
  \ pooled VICReg gradient needs to be backpropagated through the encoder. This is\
  \ tricky because the current backward() expects code-level gradients, not pooled-level\
  \ gradients.\n   \n   **Simpler approach**: Since the pooled representation is `x_temporal.mean(axis=(1,2))`,\
  \ the gradient of the loss w.r.t. x_temporal is `dL_dz_pooled` expanded back: `dL_dx_temporal\
  \ = dL_dz_pooled[:, None, None, :] / (T_final * S_final)` where T_final=26, S_final=10.\
  \ This is then added to the temporal code gradients.\n\n   Actually, the simplest\
  \ approach is to add the pooled VICReg gradient as an additional term in `dL_dtemporal_codes[-1]`:\n\
  \   ```python\n   # After JEPA training step, add pooled VICReg gradient\n   if\
  \ use_pooled_vicreg:\n       dL_dpooled = pooled_vicreg_grad(fwd[\"pooled\"])\n\
  \       # Expand to temporal output shape: (B, T_final, S_final, d)\n       # pooled\
  \ = x_temporal.mean(axis=(1,2))\n       # So dL/dx_temporal = dL/dpooled / (T_final\
  \ * S_final) broadcast\n       dL_dpooled_expanded = dL_dpooled[:, None, None, :]\
  \ / (T_final * S_final)\n       dL_dtemporal_codes[-1] += dL_dpooled_expanded  #\
  \ Add to last temporal layer's gradient\n   ```\n\n   Wait, this isn't quite right.\
  \ The pooled VICReg gradient should flow through the entire backward pass, not just\
  \ the last temporal layer. But adding it to the last temporal layer's code gradient\
  \ is the most direct path.\n\n   Actually, the encoder's backward() function takes\
  \ `dL_dtemporal_codes` which are gradients w.r.t. each temporal layer's output.\
  \ The gradient of the pooled representation w.r.t. the last temporal layer's output\
  \ is: `dL/dpooled * dpooled/dx_temporal = dL/dpooled / (T*S)`. This is correct.\n\
  \n   But we also need to consider: the pooled VICReg gradient should also flow back\
  \ through the spatial layers (since the temporal layers depend on spatial outputs).\
  \ This happens naturally through the backward() function — the temporal code gradient\
  \ propagates backward through the temporal layers and then through the spatial layers.\n\
  \n4. **Add classification with spatial_pooled_then_flat readout**:\n   ```python\n\
  \   def evaluate_classification_v2(encoder, train_grid, train_y, test_grid, test_y,\
