experimenter_view: 'Phase 5 completed successfully across 20 experiments (30 epochs,
  5 seeds, 4 variants).

  All three trained variants achieved ~82-83% classification accuracy vs 52% for untrained.

  Within-layer semantic consistency was extremely high at 0.974, strongly supporting
  that

  code dimensions carry stable semantics. However, overall consistency was 0.714 with
  a

  modest training gain of only +0.039 over untrained (0.757), triggering falsification

  criterion F2. The anchor regularization in P5-B actually slightly decreased consistency

  (anchored dims 0.700 vs free dims 0.738), triggering F5. The primary hypothesis
  is

  partially supported: dimensions are highly consistent within layers, but training
  provides

  only marginal gains in cross-layer/global semantic alignment.

  '
