falsification_criterion: 'PRIMARY FALSIFICATION (any one suffices to falsify the core
  hypothesis):


  F1: Mean overall consistency ≤ 0.30 for P5-A (codes are no more semantically

  consistent than random assignment, despite shared weights and 83% accuracy).


  F2: (P5-A consistency - untrained baseline consistency) ≤ 0.05 — training does

  not improve semantic consistency, meaning the 83% accuracy comes from

  unstructured distributed codes rather than semantically meaningful dimensions.


  F3: Within-axis spatial consistency < 0.40 for P5-A — even the shared-weight

  structural prior does not produce position-consistent semantics, indicating

  that different positions with different input statistics cause the same W_enc

  column to respond to different features.


  SECONDARY FALSIFICATION:


  F4: P5-B accuracy < 75% — anchor regularization destroys too much

  discriminative capacity.


  F5: P5-B consistency improvement over P5-A < 0.05 — anchoring does not help

  consistency, suggesting the model resists semantic alignment even with

  explicit regularization.

  '
hypothesis: 'Phase 5 — Vector Semantics Investigation.


  PRIMARY HYPOTHESIS: In the P3-C encoder trained with Reconstruction + pooled VICReg

  (P5-A, pure emergence), the 16 code dimensions carry consistent, interpretable

  semantics across spatial positions and layers. Specifically:


  (H1) INTERPRETABILITY: At least 10 of 16 code dimensions show a statistically

  significant correlation (FDR-corrected q < 0.05 across 16×5=80 tests per position

  set, minimum R² ≥ 0.04) with at least one of the 5 hand-designed semantic probes

  at ≥ 80% of spatial positions within spatial layer 0.


  (H2) WITHIN-AXIS CONSISTENCY: The mean within-axis consistency score (fraction of

  positions within a spatial layer agreeing on the dominant semantic per dimension)
  is

  ≥ 0.55 for spatial layers (well above the 0.20 chance level). This is expected due

  to shared W_enc ensuring the same computation at every position.


  (H3) CROSS-LAYER CONSISTENCY: The mean cross-layer consistency (fraction of spatial

  layers agreeing on the dominant semantic for each dimension, compared at matched

  center-position) is ≥ 0.35. This tests whether dimension j means the same thing
  at

  layer 0 vs layer 2 despite operating on different input types.


  (H4) TRAINING GAIN: The overall consistency (across all layers and axes) for P5-A
  is

  ≥ 0.15 above the untrained baseline consistency, demonstrating that

  Reconstruction+VICReg training produces semantically structured codes.


  SECONDARY HYPOTHESIS: P5-B (anchor features regularization, λ_anchor=0.1, first
  5

  dimensions anchored to 5 semantic probes applied at all intermediate layers) achieves

  overall consistency ≥ 0.55 (at least 0.10 above P5-A) while maintaining classification

  accuracy ≥ 78% (within 5pp of P5-A''s 83%).


  TERTIARY HYPOTHESIS: P5-C (disentanglement penalty, β=0.01, correlation penalty
  at

  all intermediate layers) does NOT significantly improve consistency over P5-A

  (difference < 0.05), but maintains accuracy ≥ 78%. Pure decorrelation without

  semantic anchoring does not improve interpretability.

  '
pre_registration_file: src/pre_registration.md
proposed_method: "STEP 1: Implement semantic probe extraction (src/semantic_probes.py).\n\
  \nDefine 5 scalar probes computed from the raw (B, 16, 32) binary grid,\nproducing\
  \ (B, 16, 32) feature maps (one scalar per spatial-temporal position):\n\n1. MAGNITUDE:\
  \ For position (s, t), mean of grid[max(0,s-1):min(16,s+2),\n   max(0,t-1):min(32,t+2)]\
  \ — local average activity in a 3×3 window.\n   Uses modulo-16 spatial wrapping\
  \ for boundary positions.\n\n2. GRADIENT: For position (s, t), mean(grid[(s+1)%16:(s+3)%16,\
  \ t]) -\n   mean(grid[(s-2)%16:s, t]) — right-minus-left spatial gradient.\n\n3.\
  \ VARIANCE: For position (s, t), variance of grid[s, max(0,t-4):t+1]\n   over the\
  \ last 5 timesteps — local temporal variability.\n\n4. PERIODICITY: For position\
  \ (s, t), autocorrelation at lag 2 of\n   grid[s, max(0,t-7):t+1] — measures temporal\
  \ repetitiveness.\n\n5. NOVELTY: For position (s, t), |grid[s, t] - grid[s, max(0,\
  \ t-1)]|\n   — pixel-level temporal change (0 for t=0).\n\nAlso implement downsampling\
  \ functions that average probe values over the\nreceptive field of each code position\
  \ (matching each layer's spatial\nresolution: 14→12→10 for spatial layers; 32→30→28→26\
  \ for temporal axis;\n16→10 spatial positions after spatial processing for temporal\
  \ layers).\n\nSTEP 2: Implement Phase 5 experiment runner (src/run_phase5.py).\n\
  \nTraining variants (3 variants × 5 seeds = 15 runs + 5 untrained = 20 total):\n\
  \nP5-A (Pure Emergence): Reconstruction + pooled VICReg, identical to Phase 4\n\
  best configuration (30 epochs, lr=1e-3, batch=64, λ_var=25, λ_cov=25,\nλ_l1=0.01,\
  \ alpha=0.5).\n\nP5-B (Anchor Features): Reconstruction + pooled VICReg + anchor\
  \ regularization.\nAdd loss term: L_anchor = λ_anchor * (1/5) * Σ_{j=0}^{4} ||code[:,\
  \ :, :, j] -\nprobe_j(normalized)||² at each spatial and temporal intermediate layer.\n\
  λ_anchor = 0.1 (tuned to not overwhelm reconstruction loss). The first 5 code\n\
  dimensions are softly anchored to the 5 normalized semantic probes. Remaining\n\
  11 dimensions are free. Probes are computed from raw input, downsampled to\nmatch\
  \ each layer's resolution, and L2-normalized to zero mean, unit variance\nbefore\
  \ computing the anchor loss.\n\nP5-C (Disentanglement Penalty): Reconstruction +\
  \ pooled VICReg + correlation\npenalty. Add loss term: L_dis = β * Σ_{layers} (1/(d*(d-1)))\
  \ * Σ_{j≠k}\n|Corr(code_j, code_k)|² at each intermediate layer. β = 0.01. This\
  \ encourages\ndimensions to be decorrelated (beyond the pooled VICReg's effect on\
  \ the final\nrepresentation) without specifying what each dimension should encode.\n\
  \nUntrained baseline: Same architecture, no training, 5 seeds.\n\nSTEP 3: Semantic\
  \ probing analysis.\n\nFor each trained model (all 20 runs):\na) Forward-pass the\
  \ full test set (400 samples) through the encoder, storing\n   all intermediate\
  \ codes at each (layer, s, t) position.\nb) Compute 5 semantic probe feature maps\
  \ from the raw input grids.\nc) Downsample probes to match each layer's spatial/temporal\
  \ resolution.\nd) For each (layer, s, t, code_dim_j), compute Pearson R and R² between\n\
  \   code_dim_j and each of the 5 semantic probes across samples.\ne) Assign the\
  \ dominant semantic for each (layer, s, t, j) as argmax_k |R|.\nf) Apply FDR correction\
  \ (Benjamini-Hochberg) across 16×5=80 tests per\n   position set for the significance\
  \ test.\n\nSTEP 4: Consistency scoring.\n\nFor each dimension j (1-16):\na) WITHIN-LAYER\
  \ SPATIAL CONSISTENCY: For each spatial layer l, compute the\n   fraction of spatial\
  \ positions (at a fixed timestep, e.g., t=16) that agree\n   on the dominant semantic.\
  \ Average across layers.\nb) CROSS-LAYER CONSISTENCY: For matched center positions\
  \ across spatial\n   layers (e.g., position 7 at layer 0, position 6 at layer 1,\
  \ position 5\n   at layer 2 — all covering similar spatial regions), compute the\
  \ fraction\n   of dimensions that agree on the dominant semantic across layers.\n\
  c) OVERALL CONSISTENCY: Fraction of ALL (layer, s, t) positions that agree\n   on\
  \ the most common dominant semantic for dimension j. Mean across j.\nd) TRAINING\
  \ GAIN: P5-A overall consistency minus untrained overall consistency.\n\nSTEP 5:\
  \ Classification evaluation.\n\nSame as Phase 4: spatial_pooled_then_flat readout,\
  \ SimpleLogisticRegression,\n4-class accuracy. Confirm P5-A reproduces ~83%, P5-B\
  \ ≥ 78%, P5-C ≥ 78%.\n\nSTEP 6: Statistical analysis and report (phase_5/REPORT.md).\n\
  \n- Per-dimension consistency table for P5-A, P5-B, P5-C, untrained\n- Per-dimension\
  \ dominant semantic assignment map\n- Per-layer consistency comparison\n- R² heatmap:\
  \ (code_dim × semantic_axis) at each layer\n- Falsification criteria evaluation\n\
  - Paired t-tests (by seed) comparing P5-B vs P5-A and P5-C vs P5-A\n- Recommendation\
  \ for which variant yields most interpretable semantics\n\nFiles to CREATE:\n  src/semantic_probes.py\
  \     — Semantic probe computation and downsampling\n  src/run_phase5.py       \
  \   — Phase 5 experiment runner\n  phase_5/phase5_results.csv — Raw results (accuracy,\
  \ consistency scores)\n  phase_5/consistency_analysis.csv — Per-dimension consistency\
  \ detail\n  phase_5/REPORT.md          — Comprehensive analysis report\n\nFiles\
  \ to MODIFY:\n  src/pre_registration.md    — Updated with Phase 5 hypothesis and\
  \ plan\n  current_state.md           — Updated after experiment completion\n\nExperimental\
  \ config:\n  Architecture: P3-C, d=16, d_out=16, 1,600 params\n  Training: 30 epochs,\
  \ 200 train/class, 100 test/class, batch=64, lr=1e-3\n  Base objective: Reconstruction\
  \ + pooled VICReg (λ_var=25, λ_cov=25)\n  P5-B: Base + anchor (λ_anchor=0.1, k=5)\n\
  \  P5-C: Base + disentanglement (β=0.01)\n  Seeds: [42, 43, 44, 45, 46]\n  Semantic\
  \ probes: 5 (magnitude, gradient, variance, periodicity, novelty)\n  Readout: spatial_pooled_then_flat\
  \ (416 features)\n  Evaluation: 4-class classification accuracy + consistency scores\n"
