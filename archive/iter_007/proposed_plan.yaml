falsification_criterion: "The hypothesis is falsified if ANY of the following hold:\n\
  F1: JEPA + pooled VICReg achieves < 55% test accuracy (indicating the\n    result\
  \ is not reproducible or the implementation is broken).\nF2: Any other objective\
  \ with pooled VICReg exceeds JEPA + pooled VICReg\n    by ≥ 3pp (JEPA is NOT the\
  \ best objective).\nF3: For any objective, the version WITHOUT pooled VICReg achieves\
  \ equal or\n    higher accuracy than the version WITH pooled VICReg (pooled VICReg\
  \ fix\n    does not generalise).\n"
hypothesis: "On the Phase 3 spatiotemporal benchmark (P3-C architecture, 1,600 params,\n\
  spatial_pooled_then_flat readout, pooled VICReg applied to all objectives),\nJEPA\
  \ + pooled VICReg is the best training objective. Specifically:\n(H1) JEPA + pooled\
  \ VICReg achieves test accuracy ≥ 58% (within 4pp of the\n     61.55% reference\
  \ from iter_006).\n(H2) No other objective (SFA, Hebbian, Contrastive, Reconstruction)\
  \ with\n     pooled VICReg exceeds JEPA + pooled VICReg by more than 2pp.\n(H3)\
  \ All objectives with pooled VICReg outperform their counterparts without\n    \
  \ pooled VICReg (confirming the pooled VICReg fix generalises).\n"
pre_registration_file: src/pre_registration.md
proposed_method: "Step 1: Create src/run_phase4.py — the unified Phase 4 experiment\
  \ runner.\n\nStep 2: Implement 5 training objectives adapted for SpatiotemporalEncoder:\n\
  \  - P4-A: JEPA + pooled VICReg (reference, from run_phase3_vicreg_fix.py)\n  -\
  \ P4-B: Local JEPA (prediction only, no pooled VICReg — control)\n  - P4-C: SFA\
  \ + pooled VICReg (slowness on temporal axis + variance penalty)\n  - P4-D: Hebbian\
  \ + pooled VICReg (Oja's rule on encoder weights + VICReg)\n  - P4-E: Reconstruction\
  \ (sparse AE) + pooled VICReg (local reconstruction + VICReg)\n\nFor each objective,\
  \ the training loop follows the same pattern:\n1. Forward pass through SpatiotemporalEncoder\n\
  2. Compute objective-specific loss and code gradients\n3. If pooled VICReg is enabled,\
  \ compute pooled VICReg gradient and inject\n   into the last temporal code gradient\
  \ (same mechanism as iter_006)\n4. Backward pass through encoder\n5. Adam update\
  \ on encoder parameters\n6. Evaluate with spatial_pooled_then_flat readout\n\nStep\
  \ 3: Run 5 objectives × 2 VICReg conditions (with/without) × 5 seeds\n= 50 experiments.\
  \ Plus 5 untrained baselines × 5 seeds = 25 additional.\nTotal: 55 runs. Each run:\
  \ 30 epochs, batch=64, lr=1e-3.\n\nStep 4: Save results to phase_4/phase4_results.csv\
  \ with columns:\nobjective, seed, use_pooled_vicreg, train_acc, test_acc, per-class\
  \ accs,\nfinal_loss, pooled_std, training_time_sec.\n\nStep 5: Statistical analysis\
  \ and report generation:\n- Paired t-tests between each objective and untrained\
  \ baseline\n- Effect sizes (Cohen's d)\n- Comparison table with mean ± std for all\
  \ 10+ conditions\n- VICReg ablation analysis (with vs without for each objective)\n\
  - Recommendation for default objective\n\nStep 6: Write phase_4/REPORT.md with:\n\
  - Clean comparison table (all objectives, both VICReg conditions)\n- Statistical\
  \ significance markers\n- Training stability observations\n- Compute cost comparison\n\
  - Formal recommendation\n\nFiles to create/modify:\n- src/run_phase4.py (NEW — unified\
  \ experiment runner)\n- src/pre_registration.md (UPDATE)\n- phase_4/phase4_results.csv\
  \ (NEW — results)\n- phase_4/REPORT.md (NEW — final comparison report)\n"
