falsification_criterion: "F1: JEPA + pooled VICReg achieves < 55% test accuracy (implementation\
  \ broken).\nF2: Any other objective exceeds JEPA + pooled VICReg by ≥ 3pp (JEPA\
  \ not best).\nF3: For any objective X (other than Reconstruction), accuracy(X without\
  \ VICReg)\n    ≥ accuracy(X with VICReg) — pooled VICReg does not generalise. F3\
  \ triggering\n    for Reconstruction is expected and explicitly allowed.\n"
hypothesis: "Phase 4 (Training Objective Comparison) on the P3-C spatiotemporal benchmark:\n\
  (H1) JEPA + pooled VICReg achieves test accuracy ≥ 55% (reproducing the 61.55%\n\
  \     reference from iter_006 with relaxed floor).\n(H2) No other objective (with\
  \ OR without pooled VICReg) exceeds JEPA + pooled\n     VICReg by ≥ 3 percentage\
  \ points.\n(H3) For most objectives, pooled VICReg improves accuracy over the VICReg-free\n\
  \     version. Reconstruction may violate H3 (it natively resists collapse).\n"
pre_registration_file: src/pre_registration.md
proposed_method: "Step 1: Fix src/run_phase4.py to address memory and timeout failures:\n\
  \  a) Replace multiprocessing Pool with sequential execution in main process\n \
  \ b) Add batched feature extraction for evaluation (process in chunks of 64\n  \
  \   instead of full 800-sample forward pass — avoids ~1 GB memory spike)\n  c) Remove\
  \ the redundant final_fwd forward pass on full training set;\n     use metrics[\"\
  pooled_std\"] from last epoch instead\n  d) Skip training loop for untrained baseline\
  \ (just do evaluation)\n  e) Add gc.collect() between runs to free memory\n  f)\
  \ Add --objectives CLI argument to run subset of objectives\n  g) Change results\
  \ CSV to append mode (support split runs)\n\nStep 2: Run experiments in two sequential\
  \ sub-agents to stay within timeout:\n  Sub-agent 7.2 (retry): Fix code + run JEPA\
  \ (10) + SFA (10) + untrained (5) = 25 runs\n  Sub-agent 7.3: Run Hebbian (10) +\
  \ Reconstruction (10) = 20 runs, append to CSV\n\nStep 3: Sub-agent 7.4 loads all\
  \ 45 results from phase_4/phase4_results.csv,\n  runs statistical analysis (paired\
  \ t-tests, Cohen's d), evaluates F1/F2/F3\n  falsification criteria, and generates\
  \ phase_4/REPORT.md.\n\nStep 4: Update current_state.md with Phase 4 results and\
  \ recommendation for\n  default training objective going forward.\n\nFiles to modify:\
  \ src/run_phase4.py (major refactor), src/pre_registration.md (update iteration\
  \ number)\nFiles to create: phase_4/phase4_results.csv, phase_4/REPORT.md\nFiles\
  \ to update: current_state.md\n\nExperimental config (unchanged from pre-registration):\n\
  - P3-C architecture, d=16, d_out=16, 1,600 params\n- 4 objectives × 2 VICReg conditions\
  \ × 5 seeds = 40 trained + 5 untrained = 45 runs\n- 30 epochs, batch=64, lr=1e-3,\
  \ alpha=0.5\n- Readout: spatial_pooled_then_flat (416 dims)\n- Seeds: [42, 43, 44,\
  \ 45, 46]\n"
