artifacts:
- phase_2/REPORT.md
experimenter_view: 'The universal-node hypothesis is PARTIALLY SUPPORTED. Zero-shot
  spatial→temporal

  weight transfer is completely falsified (F0: ratio=0.99, F1: -0.8pp gap), but the

  architectural form itself is validated. When trained from scratch on temporal data,

  P2-D achieves 65.3% classification accuracy—above the 60% threshold and only 1.7pp

  below the best dedicated temporal mechanism (P2-A). P2-D also achieves the lowest

  JEPA loss among all trained encoders (3.9), revealing a tradeoff between local

  predictability and downstream classification. The periodicity loophole is confirmed:

  even untrained networks score ~58% due to deterministic propagation. The conclusion

  is that one node TYPE is universal, but not one set of WEIGHTS.

  '
