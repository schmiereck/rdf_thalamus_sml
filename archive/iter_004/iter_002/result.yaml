experimenter_view: 'All 30 baseline runs (6 configs × 5 seeds) completed successfully.

  P2-A (average-pool blocks) achieved the highest test accuracy (~67%)

  among trained encoders, with moderate JEPA loss (~9.9). P2-B (RNN)

  and P2-C (feedback) showed lower classification accuracy (~63% and ~62%)

  but P2-B had the lowest JEPA loss (~5.8), suggesting strong temporal

  prediction at the cost of classification separability. Untrained baselines

  showed ~57-60% test accuracy, confirming that the JEPA predictor alone

  provides some discriminative signal even with frozen random encoders.

  The P2-A multi-tick pooling approach appears best suited for this

  3-class temporal classification task.

  '
