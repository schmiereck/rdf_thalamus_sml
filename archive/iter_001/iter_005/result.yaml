experimenter_view: "All five encoder implementations run end-to-end and all non-trivial\
  \ encoders\n(P0-B through P0-E) achieve rho >= 0.6 on seed=42. Key tuning changes:\n\
  - P0-D: lr=0.15, l1_lambda=0.002 gives rho=0.70 (baseline).\n- P0-B: Replaced HTM-style\
  \ permanence updates with competitive prototype\n  learning + inverse-distance codes\
  \ + top-k sparsity, yielding rho=0.63.\n- P0-C: Switched from Gaussian-BMU activation\
  \ to inverse Euclidean distance\n  to ALL SOM units, dramatically improving topology\
  \ preservation (rho=0.86).\n- P0-E: Increased lr to 0.1 and epochs to 200, achieving\
  \ rho=0.68.\nThe experiment runner (src/run_phase0.py) is ready to execute all 25\
  \ runs\n(5 encoders x 5 seeds) and generate phase_0/REPORT.md, but execution was\n\
  halted before the full sweep could complete.\n"
