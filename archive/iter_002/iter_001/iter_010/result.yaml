artifacts:
- test_scale.py
experimenter_view: 'The experiment conclusively demonstrates that the default embedding

  initialization (Uniform[-0.01, 0.01]) causes representation collapse,

  yielding test accuracy of 0.1920 (essentially random guessing for 5 classes)

  and an average code magnitude near zero (0.000972).


  Increasing the initialization scale dramatically mitigates this collapse.

  Normal(0, 1) achieves the highest test accuracy at 0.5040, a +31.2 percentage

  point improvement over the baseline.


  A striking secondary finding is that untrained encoders with large scale

  initializations (e.g., Normal(0, 1) at 0.5160) perform as well as or better

  than their trained counterparts. This indicates that the random projection

  itself is highly informative, and the current training process (specifically

  the L1 sparsity penalty or learning dynamics) may be actively degrading these

  useful initial representations rather than improving them.

  '
