experimenter_view: 'The hierarchical encoder successfully trains for 5 epochs per
  layer with

  cross-layer weight sharing (sharing_mode=''cross_layer'', d=8). Training loss

  decreases monotonically across all three layers: Layer 0 from 0.000072 to

  0.000055; Layer 1 from 0.000051 to 0.000043; Layer 2 from 0.000053 to 0.000044.

  The embedding matrix changes by max absolute value 0.000244 (from an initial

  uniform range of ±0.01) — a small but non-zero update, indicating that the

  gradient signal successfully reaches back to the embedding layer. Cross-layer

  weight sync is verified (all layers share identical W_enc). Loss values are

  very low overall, suggesting the auto-encoder reconstruction task is relatively

  easy for binary data with d=8 per slot. Future work may explore longer training,

  sparsity induction, or the effect of downstream classification.

  '
