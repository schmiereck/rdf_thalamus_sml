experimenter_view: 'All 128 hyperparameter configurations in the 4x4x4x2 grid completed
  successfully.

  The `normal_2.0` embedding initialization dramatically outperformed uniform init

  (53.8% vs 34.2% max), suggesting the model needs sufficiently large initial

  embeddings to learn useful representations from the 16-bit binary input.

  A stark accuracy-vs-sparsity trade-off was observed: configurations with high

  test accuracy (>50%) had near-zero code sparsity (0-1%), while configurations

  with high sparsity (>50%, driven by high l1_lambda) collapsed to near-chance

  accuracy (19-22%). No configuration achieved the dual target of >=80% accuracy

  AND >=50% sparsity, indicating that either (a) the model architecture/capacity

  is insufficient, (b) the progressive layer-by-layer training is too restrictive,

  or (c) the current hyperparameter grid misses a region that balances both objectives.

  '
