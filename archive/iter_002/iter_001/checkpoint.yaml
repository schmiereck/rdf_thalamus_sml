  \ code sparsity (fraction of elements below 10^-3 in magnitude) for the trained\
  \ P1-B codes must be ≥ 50%. If the model achieves ≥ 80% accuracy but fails this\
  \ sparsity threshold, the hypothesis is falsified.\n\n### 3. Training Mechanics\n\
  - You must document the training strategy clearly. Two options:\n  - **Progressive\
  \ training**: Train layer 1 to convergence, copy weights to layers 2/3 (if sharing),\
  \ freeze layer 1, train layer 2, etc.\n  - **Simultaneous training**: Train all\
  \ layers simultaneously with local reconstruction losses; for shared weights, average\
  \ gradients.\n- Choose one and document the rationale. The Manager warns that simultaneous\
  \ training with gradient averaging causes \"representation drift\" (layer l+1 reconstructs\
  \ a moving target from layer l). Progressive training is architecturally cleaner\
  \ for shared weights: train layer 1, then copy the trained weights to layers 2 and\
  \ 3, then run the full stack forward to compute top-layer codes for evaluation.\n\
  \n## Deliverables\n\n### A. Update `src/pre_registration.md`\nUpdate the pre-registration\
