  \ — the Phase 0 runner (pattern to follow)\n- `src/pre_registration.md` — needs\
  \ updating for Phase 1\n\n## Manager's Strategic Requirements (MUST incorporate)\n\
  \n### 1. Untrained Baseline Control\n- You MUST evaluate an **untrained (randomly\
