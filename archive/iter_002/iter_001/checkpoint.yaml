  \ code sparsity ≥ 50%)\n- NEW: Training mechanics specification (document progressive\
  \ vs simultaneous choice)\n\n### B. Create `src/node.py` — UniversalNode class\n\
  ```python\nclass UniversalNode:\n    \"\"\"Single kernel-3 node: maps 3 input slots\
  \ (each dim d) to 1 output (dim d).\"\"\"\n    \n    # Encoder: Linear(3d, d) +\
  \ tanh activation\n    # Decoder: Linear(d, 3d) (for reconstruction training)\n\
  \    # Loss: MSE(input_slots, reconstructed_slots) + lambda * L1(code)\n    \n \
  \   __init__(self, d, l1_lambda, seed):\n        Initialize W_enc (3d x d), b_enc\
  \ (d), W_dec (d x 3d), b_dec (3d)\n        Xavier initialization\n    \n    forward(self,\
  \ x_3d) -> code:\n        x_3d: shape (batch, 3, d) — 3 input slots\n        Flatten\
  \ to (batch, 3d), apply W_enc + b_enc, tanh -> code (batch, d)\n    \n    reconstruct(self,\
  \ code) -> x_hat_3d:\n        Apply W_dec + b_dec -> (batch, 3d), reshape to (batch,\
  \ 3, d)\n    \n    local_loss(self, x_3d) -> loss:\n        code = forward(x_3d)\n\
  \        recon = reconstruct(code)\n        mse = mean((x_3d - recon)^2)\n     \
  \   l1 = l1_lambda * mean(|code|)\n        return mse + l1\n    \n    compute_gradients(self,\
  \ x_3d) -> dict:\n        Compute gradients for W_enc, b_enc, W_dec, b_dec via backprop\n\
  \        (This is per-layer local backprop, NOT end-to-end)\n    \n    apply_gradients(self,\
  \ grads, lr):\n        Update parameters\n    \n    share_parameters_from(self,\
  \ other_node):\n        Copy W_enc, b_enc, W_dec, b_dec from another node\n```\n\
  \n### C. Create `src/hierarchical_encoder.py` — HierarchicalEncoder class\n```python\n\
  class HierarchicalEncoder:\n    \"\"\"Stacked kernel-3 stride-1 nodes over 16 binary\
  \ inputs.\"\"\"\n    \n    __init__(self, n_input=16, d=8, n_layers=3, sharing_mode='cross_layer',\
  \ l1_lambda=0.002, seed=42):\n        sharing_mode: 'within_layer' | 'cross_layer'\
  \ | 'none'\n        \n        # Input embedding: map binary {0,1} to d-dimensional\
  \ vectors\n        # 2 embeddings (for 0 and 1), shape (2, d)\n        self.embedding\
  \ = learnable parameter shape (2, d)\n        \n        # Create nodes\n       \
  \ if sharing_mode == 'cross_layer':\n            # One UniversalNode shared across\
  \ ALL layers and positions\n            self.shared_node = UniversalNode(d, l1_lambda,\
  \ seed)\n        elif sharing_mode == 'within_layer':\n            # One UniversalNode\
  \ per layer, shared across positions within layer\n            self.layer_nodes\
  \ = [UniversalNode(d, l1_lambda, seed+i) for i in range(n_layers)]\n        elif\
  \ sharing_mode == 'none':\n            # Independent node per position per layer\n\
  \            self.nodes = [[UniversalNode(d, l1_lambda, ...) for pos in range(positions)]\
  \ \n                          for layer in range(n_layers)]\n    \n    forward(self,\
  \ x_binary) -> top_codes:\n        x_binary: shape (batch, 16) — binary inputs\n\
  \        Step 1: Embed -> shape (batch, 16, d)\n        Step 2: For each layer:\n\
  \            positions = input_length - 2  (stride-1 kernel-3)\n            Layer\
  \ 0: 16 -> 14 positions\n            Layer 1: 14 -> 12 positions  \n           \
  \ Layer 2: 12 -> 10 positions\n            For each position p in [0, output_length-1]:\n\
  \                Gather 3 slots: input[:, p:p+3, :] -> shape (batch, 3, d)\n   \
  \             Apply node.forward() -> code[:, p, :] shape (batch, d)\n         \
  \   Output: shape (batch, positions, d)\n        Step 3: Return top-layer codes\
  \ flattened: shape (batch, 10 * d)\n    \n    train_layer(self, layer_idx, input_activations,\
  \ epochs, lr, batch_size):\n        \"\"\"Train a single layer using local reconstruction\
  \ loss.\"\"\"\n        # Extract all triplets from input_activations\n        #\
  \ For each batch:\n        #   Forward through node -> code\n        #   Reconstruct\
  \ -> x_hat\n        #   Compute loss + gradients\n        #   Apply gradients (averaging\
  \ if shared across positions)\n    \n    train(self, dataset, epochs_per_layer=100,\
  \ lr=0.01, batch_size=32):\n        \"\"\"Progressive training: train layer by layer.\"\
  \"\"\n        # PROGRESSIVE TRAINING STRATEGY:\n        # 1. Train layer 0: input\
  \ is embedding activations\n        #    For cross_layer sharing: after training,\
  \ copy weights to layers 1, 2\n        # 2. Train layer 1: input is layer-0 outputs\
  \ (frozen, no gradient to layer 0)\n        #    For cross_layer sharing: after\
  \ training, copy weights to layer 2\n        # 3. Train layer 2: input is layer-1\
  \ outputs (frozen)\n    \n    encode(self, x_binary) -> top_codes_flat:\n      \
  \  \"\"\"Forward pass returning top-layer codes for evaluation.\"\"\"\n```\n\n###\
