experimenter_view: 'The gradient check for `x_3d` was failing initially because the
  analytical

  derivation only accounted for the path from `x` through the encoder (`d_z @ W_enc.T`).

  However, the MSE loss `mean((recon - x)^2)` also depends directly on `x`, contributing

  a direct gradient term of `-d_r` (which equals `2/(B*D_in) * (x - recon)`). By adding

  this direct path to the gradient computation, the analytical gradients now perfectly

  align with the central-difference numerical approximations. All 5 parameter/input

  gradients pass the verification with relative errors well below the 1e-5 threshold.

  '
