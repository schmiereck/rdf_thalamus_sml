experimenter_view: 'The d_out bug fix (24→8 true bottleneck) and embedding init fix
  (Normal(0,1.0))

  were correctly implemented. All 35 runs completed and gradient checks passed.

  However, the scientific success criteria were NOT met:

  1. P1-B accuracy = 33.5% (target ≥80%) — the 3:1 bottleneck loses class-discriminative
  info

  2. P1-C − P1-B = −0.28 pp (PASS — sharing penalty is negligible)

  3. Trained − Untrained = −14.9 pp (FAIL — training hurts vs random features)

  4. P1-B sparsity = 0.03% (FAIL — L1=0.002 is too weak with Normal embeddings)

  The k-WTA variant achieved exactly 50% sparsity structurally but only 35.7% accuracy.

  The core issue: autoencoder reconstruction training is misaligned with classification.

  The untrained Normal(0,1) baseline outperforms all trained configs (~48% vs ~34%).

  '
