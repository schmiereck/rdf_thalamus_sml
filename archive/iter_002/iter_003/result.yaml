experimenter_view: 'The reconstruction objective (MSE + L1) is the confirmed root
  cause of the

  Phase 1 training failure. The untrained hierarchical architecture itself

  achieves 51.1% test accuracy on average, demonstrating it can represent the

  task structure. However, every trained variant degrades performance below

  this baseline (best trained: Random Embedding at 43.4%; worst: Predictive

  Coding at 38.2%). None of the tested modifications—simultaneous training,

  lateral inhibition, or strong L1—produce discriminative sparse codes or

  reach >60% accuracy. Lateral inhibition does create high sparsity (72%)

  but destroys discriminative structure (high variance, 20-53% accuracy).

  The conclusion is that local reconstruction objectives optimize for pixel-

  level fidelity rather than category-level separation, making them

  fundamentally misaligned with the classification task.

  '
