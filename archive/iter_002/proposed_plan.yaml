falsification_criterion: "The hypothesis is falsified if EITHER:\n(1) P1-B (cross-layer\
  \ sharing, d=8) achieves linear-probe accuracy < 80%\n    on the 5-category classification\
  \ task, OR\n(2) The accuracy gap P1-C − P1-B exceeds 15 percentage points (e.g.,\n\
  \    P1-C ≥ 80% and P1-B < 65%), demonstrating that cross-layer weight\n    sharing\
  \ sacrifices too much expressivity for the universal-node\n    architecture to be\
  \ viable.\n\nAdditionally, P1-D (d=4) is expected to underperform P1-B (d=8), and\n\
  P1-E (wider output) is expected to outperform P1-B; if P1-D matches or\nexceeds\
  \ P1-B, or if P1-E provides no improvement over P1-B, these\nsecondary predictions\
  \ are falsified (informing dimension design choices).\n"
hypothesis: 'A hierarchical encoder using kernel-3 stride-1 Sparse Autoencoder nodes

  (3 layers over 16 binary inputs, d=8 per slot) with cross-layer weight

  sharing and recursive dimensions (dim_out = dim_in per slot = 8) achieves:

  (a) linear-probe accuracy ≥ 80% on five structured 16-bit input categories,

  and (b) accuracy within 15 percentage points of an independent-weights-per-node

  upper bound (P1-C), when both are trained with local reconstruction objectives

  (MSE + L1 sparsity) without end-to-end backpropagation.


  Specifically, the strict universal-node form (single weight matrix shared across

  all layers and positions, recursive d=8) does NOT sacrifice more than 15pp of

  classification accuracy relative to the fully independent per-node weights

  upper bound, confirming that the universal-node architecture is expressively

  viable for spatial hierarchy.

  '
pre_registration_file: src/pre_registration.md
proposed_method: "EXPERIMENTAL PROTOCOL — Phase 1: Spatial Hierarchy without Time\n\
  \n1. CREATE src/node.py — UniversalNode class\n   - Encoder: Linear(3d, d) + tanh\
  \ activation\n   - Decoder: Linear(d, 3d) (reconstruction)\n   - Loss: MSE(input,\
  \ reconstruction) + λ * L1(code)\n   - Methods: forward(x_3d) → code, reconstruct(code)\
  \ → x_hat\n   - Support weight sharing: parameters can be shared across instances\n\
  \n2. CREATE src/hierarchical_encoder.py — HierarchicalEncoder class\n   - Input:\
  \ 16 binary pixels → learnable embedding (2×d lookup table)\n   - Stack 3 layers\
  \ of kernel-3 stride-1 nodes\n   - Configurable weight_sharing mode: 'within_layer'\
  \ | 'cross_layer' | 'none'\n   - Configurable d per slot (8 for P1-A/B/C, 4 for\
  \ P1-D)\n   - For P1-E: support d_in=8, d_out=16 (non-recursive)\n   - Training:\
  \ layer-by-layer local reconstruction loss, no cross-layer gradient flow\n   - For\
  \ shared weights: average gradients across layers before update\n   - Forward: returns\
  \ top-layer codes (10 × d flattened)\n\n3. CREATE src/dataset_phase1.py — Five structured\
  \ 16-bit datasets\n   - Category 1: Uniform random bits (control)\n   - Category\
  \ 2: Single-blob (one contiguous run of 1s, random position & width)\n   - Category\
  \ 3: Two-blob (two separate runs of 1s)\n   - Category 4: Periodic patterns (periods\
  \ 2, 3, 4, with random phase)\n   - Category 5: Mixed noise (structured base + random\
  \ bit flips at 10-20% rate)\n   - Each category: 200 train + 100 test samples =\
  \ 1000 train + 500 test total\n   - Labels: category index (0-4) for linear probe\
  \ evaluation\n\n4. CREATE src/eval_phase1.py — Evaluation module\n   - Linear probe:\
  \ fit sklearn-free logistic regression on top-layer codes\n     (simple gradient\
  \ descent, 200 epochs, lr=0.1, no regularization)\n   - Train on train-set codes,\
  \ evaluate accuracy on test-set codes\n   - Also compute: per-layer reconstruction\
  \ MSE, code sparsity, parameter count\n   - Report per-config, per-seed results\n\
  \n5. CREATE src/run_phase1.py — Experiment runner\n   - 5 configurations (P1-A through\
  \ P1-E) × 5 seeds (42-46) = 25 runs\n   - Each run: instantiate HierarchicalEncoder,\
  \ train unsupervised, evaluate\n   - Save results to phase_1/results.csv\n   - Generate\
  \ phase_1/REPORT.md with comparison table and pass/fail assessment\n\n6. GENERATE\
  \ phase_1/REPORT.md — Comparison report including:\n   - Table: config × metric\
  \ (accuracy, params, sparsity, recon_loss)\n   - P1-B vs P1-C gap analysis (primary\
  \ hypothesis test)\n   - P1-D vs P1-B dimension comparison\n   - P1-E vs P1-B recursive-constraint\
  \ comparison\n   - P1-A vs P1-B within-layer vs cross-layer comparison\n   - Pass/fail\
  \ on each Phase 1 success criterion\n\nCONTROL CONDITIONS:\n- P1-C (no sharing,\
  \ d=8) serves as the expressivity upper bound\n- P1-A (within-layer sharing) serves\
  \ as the standard CNN baseline\n- Random-init untrained encoder serves as chance-level\
  \ baseline (~20% for 5 classes)\n- All configs use the same training budget (100\
  \ epochs per layer), same dataset,\n  same seeds, same embedding initialization\n\
  \nHYPERPARAMETERS (fixed across all configs):\n- d = 8 per slot (except P1-D: d=4,\
  \ P1-E: d_out=16)\n- λ_L1 = 0.002 (sparsity penalty, from Phase 0 P0-D tuning)\n\
  - learning_rate = 0.01\n- epochs = 100 per layer\n- batch_size = 32\n- 3 layers\
  \ (depths: 14, 12, 10 positions)\n- seeds: 42, 43, 44, 45, 46\n\nFILES MODIFIED:\
  \ None (all new files; existing src/ files are read-only references)\nFILES CREATED:\
  \ src/node.py, src/hierarchical_encoder.py, src/dataset_phase1.py,\n           \
  \    src/eval_phase1.py, src/run_phase1.py, phase_1/REPORT.md\n"
