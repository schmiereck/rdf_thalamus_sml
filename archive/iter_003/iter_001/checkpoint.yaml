task: "## Task: Implement Alternative Training Objectives for HSUN Phase 1\n\n###\
  \ Context\nThe HSUN project has a hierarchical encoder with UniversalNodes (kernel-3,\
  \ stride-1) over 16 binary inputs. Phase 1 found that reconstruction training DEGRADES\
  \ representations below the untrained baseline (48.4%). We need to test alternative\
  \ local objectives to see if any can beat the untrained baseline.\n\n### CRITICAL:\
  \ Read Pre-Registration First\nBefore writing any code, read `src/pre_registration.md`\
  \ for the hypothesis and falsification criteria. All implementations must adhere\
  \ to these criteria.\n\n### What to Implement\n\n#### 1. Create `src/training_objectives.py`\
  \ with four loss classes:\n\n**JEPALoss**: Bidirectional neighbor prediction at\
  \ each layer\n- At each layer l, for each position p: predict code_{p+1} from code_p\
  \ and predict code_p from code_{p+1} (bidirectional)\n- Predictor: linear layer\
  \ (d→d) per layer, NOT shared across layers\n- VICReg collapse prevention with standard\
  \ defaults: λ_var=25, μ_cov=25, ν_inv=1\n  - Variance term: max(0, γ - std(code))\
  \ for each dimension (γ=1.0 target std)\n  - Covariance term: sum of off-diagonal\
  \ elements of covariance matrix of codes\n  - Invariance term: MSE between predicted\
  \ and target codes\n- Total JEPA loss = ν_inv * prediction_loss + λ_var * variance_penalty\
  \ + μ_cov * covariance_penalty\n- Must return: loss value, gradient of loss w.r.t.\
  \ codes at each layer (needed for backprop)\n\n**ContrastiveLoss**: InfoNCE with\
  \ bit-flip augmentation\n- For each sample x (16 binary pixels), create augmented\
  \ version by flipping 1-2 random bits\n- Encode both original and augmented through\
  \ the encoder\n- Projection head: MLP(80→40→20) for d=8 (top layer has 10 positions\
  \ × 8 = 80 features), L2 normalize\n- InfoNCE loss with temperature τ=0.5\n- Operates\
  \ only on the FINAL (top) layer codes, not per-layer\n\n**SFALoss**: Slow Feature\
  \ Analysis at each layer\n- At each layer, minimize ||code_{p+1} - code_p||² (adjacent\
  \ positions should have similar codes)\n- Variance constraint: std of codes across\
  \ positions should be ≥ 1.0 (penalize if below)\n- Total SFA loss = slowness_loss\
  \ + λ_var * max(0, 1 - std(codes))\n\n**HebbianLoss**: Oja-style local learning\n\
  - NOT gradient-based — use Oja's rule directly for online updates\n- ΔW_enc += η\
  \ * (y * x^T - y * y^T * W_enc)  where y = tanh(W_enc @ x + b_enc)\n- Decorrelation\
  \ penalty: subtract mean(y) from y before applying Oja's rule\n- Apply per-position\
  \ per-layer, then average (similar to shared-weight training)\n- The \"loss\" is\
  \ a monitoring quantity: negative correlation between y and x means things are going\
  \ wrong\n\n#### 2. Modify `src/hierarchical_encoder.py`:\n\nAdd a `forward_with_intermediates()`\
  \ method that returns:\n- codes at each layer: list of (batch, n_positions, d) arrays\n\
  - the node inputs at each layer: list of (batch, n_positions, 3, d) arrays\n- the\
  \ final flattened code\n\nAdd a `backward_from_code_grads()` method that takes:\n\
  - dL/d_code at each layer (from the training objective)\n- The stored forward pass\
  \ intermediates\nAnd computes:\n- Gradient of the loss w.r.t. W_enc, b_enc at each\
  \ layer\n- Gradient of the loss w.r.t. the embedding\n\nThis requires implementing\
  \ the chain rule through the tanh activation:\nGiven dL/da (gradient w.r.t. code\
  \ = tanh(z)):\n  dL/dz = dL/da * (1 - tanh(z)²)\n  dL/dW_enc = x_flat.T @ dL/dz\n\
  \  dL/db_enc = sum(dL/dz, axis=0)\n  dL/dx = dL/dz @ W_enc.T  (propagate to previous\
  \ layer)\n\nFor shared weights (cross_layer), accumulate gradients across all positions\
  \ and layers before applying.\n\n#### 3. Create `src/run_phase1_v2.py` experiment\
  \ runner:\n\n**7 configurations × 5 seeds (42–46) = 35 total runs:**\n1. P1-B-JEPA-d8:\
  \ cross_layer sharing, d=8, d_out=8, JEPA loss\n2. P1-B-Contrastive-d8: cross_layer\
  \ sharing, d=8, d_out=8, Contrastive loss\n3. P1-B-SFA-d8: cross_layer sharing,\
  \ d=8, d_out=8, SFA loss\n4. P1-B-Hebbian-d8: cross_layer sharing, d=8, d_out=8,\
  \ Hebbian updates\n5. P1-B-JEPA-d16: cross_layer sharing, d=16, d_out=16, JEPA loss\
  \ (test d=8 vs d=16)\n6. Untrained-d8: cross_layer sharing, d=8, d_out=8, no training\
  \ (same-session baseline)\n7. Untrained-d16: cross_layer sharing, d=16, d_out=16,\
  \ no training (same-session baseline)\n\n**Training parameters:**\n- 200 epochs\
  \ (simultaneous training of all layers, not progressive)\n- batch_size=64\n- For\
  \ JEPA/Contrastive/SFA: Adam-like optimizer (or plain SGD with momentum)\n  - Since\
  \ we're numpy-only, implement simple Adam: m = β1*m + (1-β1)*g, v = β2*v + (1-β2)*g²,\
  \ param -= lr * m / (sqrt(v) + ε)\n  - lr=1e-3, β1=0.9, β2=0.999, ε=1e-8\n- For\
  \ Hebbian: use Oja's rule with η=1e-3\n- No L1 penalty for non-reconstruction objectives\n\
  - No k-WTA for non-reconstruction objectives (unless explicitly tested)\n\n**Evaluation:**\n\
  - After training, encode train_x and test_x\n- Linear probe: SimpleLogisticRegression\
  \ from src/harness.py (5 classes, lr=0.1, max_iter=500)\n- Metrics: test_accuracy,\
  \ train_accuracy, sparsity (fraction |code|<1e-3), n_params\n- For untrained baselines:\
  \ use same dataset generation and evaluation protocol\n\n**Output:** Save results\
  \ to `phase_1/objectives_results.csv` with columns:\nconfig, seed, test_accuracy,\
  \ train_accuracy, sparsity, n_params\n\n### Implementation Notes\n\n1. **KEEP IT\
  \ SIMPLE.** Use pure numpy. No external ML libraries.\n\n2. **The UniversalNode\
  \ already has W_enc, b_enc, W_dec, b_dec.** For non-reconstruction objectives, W_dec\
  \ and b_dec are not trained (they remain at initialization). The evaluation function\
  \ `evaluate_hierarchical_encoder` calls `compute_reconstruction_mse` which uses\
  \ W_dec — this will give high MSE for non-reconstruction objectives but that's fine,\
  \ we just need accuracy.\n\n3. **Embedding:** Use Normal(0, 1) initialization (confirmed\
  \ working from Phase 1 diagnostics).\n\n4. **Simultaneous training:** All layers\
  \ train at once (confirmed better than progressive in iter_002). For cross_layer\
  \ sharing, all layer_nodes point to the same master node (like in SimultaneousHierarchicalEncoder).\n\
  \n5. **For ContrastiveLoss**, the projection head parameters must be trained alongside\
  \ the encoder. Use Adam for the projection head too.\n\n6. **For JEPALoss**, the\
  \ predictor (linear d→d per layer) parameters must be trained alongside the encoder.\
  \ Use Adam for predictors too.\n\n7. **Crucial:** Run Untrained-d8 and Untrained-d16\
  \ IN THE SAME SESSION as the trained configs. Do NOT reuse old results. This ensures\
  \ perfectly fair comparison (same dataset generation, same evaluation code, same\
  \ random seeds).\n\n8. **Code must work end-to-end.** After implementation, run\
  \ the full experiment and save results to CSV. If there are bugs, fix them and re-run.\n\
  \n9. **Existing files to read for context:**\n   - src/node.py — UniversalNode class\
  \ with forward, compute_gradients, apply_gradients\n   - src/hierarchical_encoder.py\
  \ — HierarchicalEncoder with forward, train, _forward_layer\n   - src/dataset_phase1.py\
  \ — generate_phase1_dataset\n   - src/eval_phase1.py — evaluate_hierarchical_encoder\n\
  \   - src/harness.py — SimpleLogisticRegression, compute_sparsity\n   - src/diagnostic_phase1.py\
  \ — SimultaneousHierarchicalEncoder (good reference for simultaneous training)\n\
  \n10. **Run from the project root directory** (not from src/). The scripts use `sys.path`\
  \ manipulation for imports.\n\n### Success Criteria\n- All 7 configs × 5 seeds =\
  \ 35 runs complete without errors\n- Results saved to phase_1/objectives_results.csv\n\
  - At minimum, the untrained baselines reproduce known values (~48% for d=8)\n"
